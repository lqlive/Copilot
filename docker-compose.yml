services:
  copilot:
    image: ${DOCKER_REGISTRY-}copilot
    build:
      context: .
      dockerfile: src/Copilot/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
      
  copilot.agent:
    image: ${DOCKER_REGISTRY-}copilotagent
    build:
      context: .
      dockerfile: src/Copilot.Agent/Dockerfile

